services:
  backend:
    build:
      context: ./backend
    environment:
      SUDOKU_DB_PATH: /data/sudoku.sqlite
      LOG_LEVEL: INFO
    volumes:
      - sudoku-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  sudoku-data:

