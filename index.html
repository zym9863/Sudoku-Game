<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-puzzle-piece"></i> 数独游戏</h1>
        <div class="game-controls">
            <button id="new-game"><i class="fas fa-plus-circle"></i> 新游戏</button>
            <button id="check-solution"><i class="fas fa-check-circle"></i> 检查</button>
            <select id="difficulty">
                <option value="easy">简单</option>
                <option value="medium">中等</option>
                <option value="hard">困难</option>
            </select>
        </div>
        <div class="sudoku-board" id="sudoku-board">
            <!-- 9x9 grid will be generated by JavaScript -->
        </div>
        <div class="message" id="message"></div>
        <div class="instructions">
            <h2><i class="fas fa-info-circle"></i> 游戏规则</h2>
            <p>在每个空格中填入1到9的数字，使得每行、每列和每个3x3宫格中的数字不重复。</p>
            <p>点击单元格并输入数字来填写。</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
